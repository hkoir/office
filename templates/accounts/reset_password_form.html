{% extends "sub_base.html" %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="card-title mb-4 text-center">Reset Your Password</h4>

            {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="phone" value="{{ phone }}">

                <div class="mb-3">
                    <label for="otp" class="form-label">OTP</label>
                    <input type="text" class="form-control" id="otp" name="otp" placeholder="Enter the OTP sent to your phone" required>
                </div>

                <div class="mb-3">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" placeholder="Enter new password" required>
                </div>

                <div class="mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-enter new password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Reset Password</button>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted">
                    Didn’t receive the OTP?
                    <span id="resend-section">
                        <a id="resend-link" href="{% url 'accounts:resend_password_reset_otp' phone %}" class="text-decoration-none d-none">Resend</a>
                        <span id="countdown"></span>
                    </span>
                </small>
            </div>

            <div class="mt-3 text-center">
                <a href="{% url 'accounts:login' %}" class="text-decoration-none">Back to Login</a>
            </div>
        </div>
    </div>
</div>

{% if valid_until %}
<script>
    const validUntil = new Date("{{ valid_until|date:'c' }}");  // ISO 8601 format
    const countdownEl = document.getElementById("countdown");
    const resendLink = document.getElementById("resend-link");

    function updateCountdown() {
        const now = new Date();
        const diff = validUntil - now;

        if (diff <= 0) {
            countdownEl.innerText = '';
            resendLink.classList.remove('d-none');  // Show the resend link
            clearInterval(timer);
        } else {
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            countdownEl.innerText = ` (Resend available in ${minutes}:${remainingSeconds.toString().padStart(2,'0')})`;
        }
    }

    const timer = setInterval(updateCountdown, 1000);
    updateCountdown(); // Run immediately
</script>
{% endif %}
{% endblock %}
